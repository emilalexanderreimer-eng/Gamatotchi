<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mein Baum 🌱</title>
  <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      color: #f0f4e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #050812;
      overflow-x: hidden;
    }

    /* SKY */
    .sky {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }
    .sky-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, #050812 0%, #0a0e2a 50%, #111840 100%);
      transition: background 3s ease;
    }
    .celestial {
      position: absolute;
      width: 52px; height: 52px;
      border-radius: 50%;
      transition: left 8s linear, top 8s linear, background 3s ease;
    }
    .stars { position: absolute; inset: 0; }
    .star {
      position: absolute; background: white; border-radius: 50%;
      animation: twinkle var(--d,3s) ease-in-out infinite;
      animation-delay: var(--del,0s);
    }
    @keyframes twinkle {
      0%,100% { opacity:.2; } 50% { opacity:1; }
    }
    .clouds { position: absolute; inset: 0; pointer-events: none; }
    .cloud {
      position: absolute;
      background: rgba(255,255,255,.85);
      border-radius: 50px;
      animation: drift linear infinite;
    }
    .cloud::before,.cloud::after {
      content:''; position:absolute;
      background: rgba(255,255,255,.85);
      border-radius: 50%;
    }
    .c1 { width:120px;height:36px;top:12%;animation-duration:60s;animation-delay:-10s; }
    .c1::before { width:56px;height:56px;top:-28px;left:18px; }
    .c1::after  { width:40px;height:40px;top:-20px;left:60px; }
    .c2 { width:90px;height:28px;top:22%;opacity:.7;animation-duration:80s;animation-delay:-35s; }
    .c2::before { width:40px;height:40px;top:-20px;left:14px; }
    .c2::after  { width:32px;height:32px;top:-14px;left:44px; }
    @keyframes drift { from{left:-200px} to{left:110vw} }

    /* GROUND */
    .ground {
      position: fixed; bottom:0; left:0; right:0; height:75px; z-index:1;
      background: linear-gradient(to bottom, #2d5a1b 0%, #1e3d10 40%, #3d2008 100%);
    }
    .ground::before {
      content:''; position:absolute; top:0; left:0; right:0; height:12px;
      background: linear-gradient(to right,#3a7a1a,#4a9a22,#3a7a1a,#52a828,#3a7a1a);
      border-radius: 40% 40% 0 0 / 60% 60% 0 0;
    }

    /* APP */
    .app {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 1rem 5rem;
      gap: .6rem;
    }

    /* HEADER */
    header {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 1.2rem .5rem .5rem;
    }
    .time-pill, .day-pill {
      font-size: .82rem; font-weight: 500;
      background: rgba(0,0,0,.3);
      padding: .3rem .7rem; border-radius: 20px;
      letter-spacing: .05em;
    }
    .day-pill { color: #5bbd5b; }
    h1 {
      font-family: 'Cabin', sans-serif;
      font-size: 1.6rem; font-weight: 700;
      text-shadow: 0 2px 12px rgba(0,0,0,.5);
    }

    /* TREE */
    .tree-scene { width:100%; max-width:400px; position:relative; }
    .tree-svg {
      width:100%; height:auto;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,.4));
    }
    #canopyGroup { transform-origin:200px 360px; animation:sway 6s ease-in-out infinite; }
    @keyframes sway { 0%,100%{transform:rotate(-1deg)} 50%{transform:rotate(1.2deg)} }
    .blossom { animation: bpulse 4s ease-in-out infinite; }
    .blossom:nth-child(2){animation-delay:-1.3s}
    .blossom:nth-child(3){animation-delay:-2.6s}
    @keyframes bpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
    .fruit { animation:fdangle 5s ease-in-out infinite; }
    .fruit:nth-child(2){animation-delay:-1.5s}
    .fruit:nth-child(3){animation-delay:-2.8s}
    @keyframes fdangle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(3px)} }
    .fallen-petals { position:absolute;bottom:10px;left:0;right:0;height:30px;pointer-events:none; }
    .petal {
      position:absolute; width:10px; height:7px;
      background:#ffb3c6; border-radius:50% 50% 50% 0;
      animation: petalfall 8s ease-in infinite; opacity:.7;
    }
    @keyframes petalfall {
      0%{transform:translateY(-300px) rotate(0deg);opacity:0}
      10%{opacity:.8} 90%{opacity:.6}
      100%{transform:translateY(0) translateX(30px) rotate(180deg);opacity:0}
    }
    .water-drop { animation: wdrop 1.2s ease-in infinite; opacity:0; }
    .water-drop:nth-child(2){animation-delay:.3s}
    .water-drop:nth-child(3){animation-delay:.6s}
    .water-drop:nth-child(4){animation-delay:.9s}
    @keyframes wdrop {
      0%{transform:translateY(-20px);opacity:0}
      20%{opacity:.9} 80%{opacity:.7}
      100%{transform:translateY(30px);opacity:0}
    }

    /* STATUS */
    .status-panel {
      width:100%;
      background: rgba(10,20,8,.55);
      border: 1px solid rgba(100,180,80,.25);
      border-radius:18px; padding:1rem 1.2rem;
      backdrop-filter:blur(10px);
    }
    .status-row { display:flex; gap:1.2rem; margin-bottom:.8rem; }
    .status-item { flex:1; display:flex; align-items:center; gap:.6rem; }
    .status-icon { font-size:1.4rem; flex-shrink:0; }
    .status-info { flex:1; }
    .s-label {
      display:block; font-size:.7rem; font-weight:500; color:#b8c4a0;
      text-transform:uppercase; letter-spacing:.08em; margin-bottom:.3rem;
    }
    .pbar { width:100%; height:6px; background:rgba(255,255,255,.12); border-radius:10px; overflow:hidden; }
    .pfill { height:100%; border-radius:10px; transition:width .8s ease; }
    .wfill { background:linear-gradient(to right,#29b6f6,#81d4fa); }
    .hfill { background:linear-gradient(to right,#66bb6a,#a5d6a7); }
    .stage-row {
      display:flex; align-items:center; justify-content:center; gap:.6rem;
      padding-top:.5rem; border-top:1px solid rgba(255,255,255,.08);
    }
    .stage-emoji { font-size:1.3rem; }
    .stage-name { font-family:'Cabin',sans-serif; font-size:1rem; font-weight:600; color:#5bbd5b; }

    /* MESSAGE */
    .msgbox {
      width:100%; background:rgba(0,0,0,.3);
      border:1px solid rgba(255,255,255,.1);
      border-radius:14px; padding:.8rem 1.2rem;
      text-align:center; min-height:48px;
      display:flex; align-items:center; justify-content:center;
    }
    .msgbox p { font-size:.9rem; color:#b8c4a0; line-height:1.5; transition:opacity .3s; }

    /* WATER BUTTON */
    .water-btn {
      display:flex; flex-direction:column; align-items:center; gap:.2rem;
      background:linear-gradient(135deg,#1565c0,#1976d2,#42a5f5);
      border:none; border-radius:24px; padding:1rem 3rem;
      cursor:pointer;
      box-shadow:0 4px 20px rgba(21,101,192,.5);
      transition:transform .15s, box-shadow .2s, opacity .3s;
      position:relative; overflow:hidden;
    }
    .water-btn::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
      border-radius:24px;
    }
    .water-btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(21,101,192,.7); }
    .water-btn:active { transform:translateY(0); }
    .water-btn.cooling { opacity:.5; cursor:not-allowed; }
    .btn-icon { font-size:1.8rem; }
    .btn-text { font-family:'Cabin',sans-serif; font-size:1.1rem; font-weight:700; color:#fff; }
    .btn-sub  { font-size:.7rem; color:rgba(255,255,255,.75); }
    .next-info { font-size:.78rem; color:#b8c4a0; text-align:center; min-height:20px; }

    /* TEST PANEL */
    .test-panel {
      width:100%;
      background:rgba(20,10,40,.75);
      border:1px solid rgba(150,100,255,.35);
      border-radius:16px; padding:1rem 1.2rem;
      backdrop-filter:blur(10px);
    }
    .test-title {
      font-family:'Cabin',sans-serif; font-size:.8rem; font-weight:700;
      color:#b39ddb; text-transform:uppercase; letter-spacing:.1em;
      margin-bottom:.8rem;
    }
    .test-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:.5rem; }
    .test-label { font-size:.8rem; color:#9e9e9e; }
    .test-value { font-size:.85rem; font-weight:600; color:#ce93d8; }
    #intervalSlider {
      -webkit-appearance:none; appearance:none;
      width:100%; height:6px; border-radius:10px; outline:none; cursor:pointer;
      background:linear-gradient(to right,#7b1fa2,#ce93d8);
      margin-bottom:.35rem;
    }
    #intervalSlider::-webkit-slider-thumb {
      -webkit-appearance:none; width:22px; height:22px;
      border-radius:50%; background:#ce93d8;
      box-shadow:0 0 8px rgba(206,147,216,.8);
      cursor:pointer; border:2px solid #fff;
    }
    #intervalSlider::-moz-range-thumb {
      width:22px; height:22px; border-radius:50%; background:#ce93d8;
      box-shadow:0 0 8px rgba(206,147,216,.8); cursor:pointer; border:2px solid #fff;
    }
    .test-ticks {
      display:flex; justify-content:space-between;
      font-size:.62rem; color:#616161; margin-bottom:.9rem;
    }
    .reset-btn {
      width:100%; background:rgba(183,28,28,.2);
      border:1px solid rgba(183,28,28,.4); border-radius:10px;
      padding:.55rem; font-size:.78rem; color:#ef9a9a;
      cursor:pointer; transition:background .2s;
    }
    .reset-btn:hover { background:rgba(183,28,28,.4); }

    /* DEATH OVERLAY */
    .death-overlay {
      position:fixed; inset:0; z-index:100;
      background:rgba(10,5,0,.88);
      display:none; align-items:center; justify-content:center;
      backdrop-filter:blur(6px);
    }
    .death-overlay.show { display:flex; }
    .death-box {
      text-align:center; padding:2.5rem 2rem;
      background:rgba(30,10,0,.8);
      border:1px solid rgba(150,80,30,.4);
      border-radius:24px; max-width:300px;
    }
    .death-box .de { font-size:4rem; margin-bottom:1rem; }
    .death-box h2 { font-family:'Cabin',sans-serif; font-size:1.3rem; color:#e0c0a0; margin-bottom:.6rem; }
    .death-box p  { font-size:.9rem; color:rgba(200,160,120,.75); margin-bottom:1.5rem; }
    .restart-btn {
      background:linear-gradient(135deg,#2d6a2d,#4caf50);
      border:none; border-radius:16px; padding:.8rem 2rem;
      font-family:'Cabin',sans-serif; font-size:1rem; font-weight:700;
      color:#fff; cursor:pointer; box-shadow:0 4px 16px rgba(76,175,80,.4);
    }

    /* WATERING ANIM */
    .watering-overlay {
      position:fixed; inset:0; z-index:50;
      background:rgba(0,20,40,.4);
      display:none; align-items:center; justify-content:center;
      pointer-events:none;
    }
    .watering-overlay.show { display:flex; }
    .watering-box { text-align:center; animation:wbounce .5s ease-in-out infinite alternate; }
    .watering-box .wcan { font-size:3.5rem; display:block; margin-bottom:.5rem; }
    .watering-box p { font-family:'Cabin',sans-serif; font-size:1.1rem; color:#90caf9; font-weight:600; }
    @keyframes wbounce { from{transform:rotate(-10deg) translateY(0)} to{transform:rotate(10deg) translateY(-8px)} }

    /* HEALTH */
    body.low-health .hfill { background:linear-gradient(to right,#ef5350,#ef9a9a); }
    body.critical-health .hfill { background:linear-gradient(to right,#b71c1c,#e57373); animation:hpulse 1s ease-in-out infinite; }
    @keyframes hpulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  </style>
</head>
<body>

  <!-- Sky -->
  <div class="sky">
    <div class="sky-gradient" id="skyGradient"></div>
    <div class="celestial" id="celestial"></div>
    <div class="stars" id="stars"></div>
    <div class="clouds">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
    </div>
  </div>

  <!-- Ground -->
  <div class="ground"></div>

  <!-- App -->
  <div class="app">

    <header>
      <div class="time-pill" id="timePill">00:00</div>
      <h1>Mein Baum</h1>
      <div class="day-pill" id="dayPill">Gießung 0</div>
    </header>

    <!-- Tree SVG -->
    <div class="tree-scene">
      <svg class="tree-svg" viewBox="0 0 400 420" xmlns="http://www.w3.org/2000/svg">
        <!-- Pot -->
        <g id="potGroup">
          <rect x="165" y="360" width="70" height="50" rx="8" fill="#8B5E3C"/>
          <rect x="158" y="355" width="84" height="14" rx="6" fill="#A0734E"/>
          <rect x="168" y="358" width="64" height="10" rx="4" fill="#5d3a1a"/>
        </g>
        <!-- Trunk -->
        <g id="trunkGroup" opacity="0">
          <path d="M200 360 Q195 300 198 240 Q196 200 200 160" stroke="#6B4226" stroke-width="12" fill="none" stroke-linecap="round"/>
        </g>
        <!-- Branches -->
        <g id="branchGroup" opacity="0">
          <path d="M198 260 Q170 240 145 230" stroke="#6B4226" stroke-width="7" fill="none" stroke-linecap="round"/>
          <path d="M199 240 Q225 218 252 210" stroke="#6B4226" stroke-width="7" fill="none" stroke-linecap="round"/>
          <path d="M198 210 Q168 195 140 185" stroke="#6B4226" stroke-width="5" fill="none" stroke-linecap="round"/>
          <path d="M199 195 Q228 178 258 170" stroke="#6B4226" stroke-width="5" fill="none" stroke-linecap="round"/>
        </g>
        <!-- Canopy -->
        <g id="canopyGroup" opacity="0">
          <ellipse cx="200" cy="155" rx="80" ry="65" fill="#2d6a2d"/>
          <ellipse cx="148" cy="185" rx="55" ry="42" fill="#2d7a2d"/>
          <ellipse cx="252" cy="178" rx="55" ry="42" fill="#2d7a2d"/>
          <ellipse cx="200" cy="115" rx="55" ry="45" fill="#339933"/>
          <ellipse cx="185" cy="108" rx="28" ry="22" fill="#44bb44" opacity="0.6"/>
        </g>
        <!-- Blossoms -->
        <g id="blossomGroup" opacity="0">
          <g class="blossom" transform="translate(155,150)">
            <circle cx="0" cy="-8" r="6" fill="#ffb3c6"/><circle cx="7" cy="-3" r="6" fill="#ffb3c6"/>
            <circle cx="7" cy="5" r="6" fill="#ffb3c6"/><circle cx="0" cy="8" r="6" fill="#ffb3c6"/>
            <circle cx="-7" cy="5" r="6" fill="#ffb3c6"/><circle cx="-7" cy="-3" r="6" fill="#ffb3c6"/>
            <circle cx="0" cy="0" r="5" fill="#ffe066"/>
          </g>
          <g class="blossom" transform="translate(240,143)">
            <circle cx="0" cy="-7" r="5.5" fill="#ffc0d0"/><circle cx="6" cy="-3" r="5.5" fill="#ffc0d0"/>
            <circle cx="6" cy="4" r="5.5" fill="#ffc0d0"/><circle cx="0" cy="7" r="5.5" fill="#ffc0d0"/>
            <circle cx="-6" cy="4" r="5.5" fill="#ffc0d0"/><circle cx="-6" cy="-3" r="5.5" fill="#ffc0d0"/>
            <circle cx="0" cy="0" r="4.5" fill="#ffe066"/>
          </g>
          <g class="blossom" transform="translate(200,118)">
            <circle cx="0" cy="-7" r="5" fill="#ffadc2"/><circle cx="6" cy="-2" r="5" fill="#ffadc2"/>
            <circle cx="6" cy="5" r="5" fill="#ffadc2"/><circle cx="0" cy="7" r="5" fill="#ffadc2"/>
            <circle cx="-6" cy="5" r="5" fill="#ffadc2"/><circle cx="-6" cy="-2" r="5" fill="#ffadc2"/>
            <circle cx="0" cy="0" r="4" fill="#ffe066"/>
          </g>
        </g>
        <!-- Fruits -->
        <g id="fruitGroup" opacity="0">
          <g class="fruit" transform="translate(155,178)">
            <circle r="10" fill="#e63946"/>
            <path d="M0,-10 Q3,-16 6,-12" stroke="#6B4226" stroke-width="1.5" fill="none"/>
            <ellipse cx="-3" cy="-5" rx="3" ry="5" fill="#ff6b6b" opacity="0.5"/>
          </g>
          <g class="fruit" transform="translate(245,170)">
            <circle r="11" fill="#d62828"/>
            <path d="M0,-11 Q3,-17 6,-13" stroke="#6B4226" stroke-width="1.5" fill="none"/>
            <ellipse cx="-3" cy="-5" rx="3" ry="5" fill="#ff6b6b" opacity="0.5"/>
          </g>
          <g class="fruit" transform="translate(200,135)">
            <circle r="9" fill="#e63946"/>
            <path d="M0,-9 Q3,-15 6,-11" stroke="#6B4226" stroke-width="1.5" fill="none"/>
            <ellipse cx="-3" cy="-4" rx="2.5" ry="4.5" fill="#ff6b6b" opacity="0.5"/>
          </g>
        </g>
        <!-- Dead -->
        <g id="deadGroup" opacity="0">
          <path d="M200 360 Q195 300 198 240 Q196 200 200 160" stroke="#4a3520" stroke-width="12" fill="none" stroke-linecap="round"/>
          <path d="M198 260 Q170 240 145 230" stroke="#4a3520" stroke-width="7" fill="none" stroke-linecap="round"/>
          <path d="M199 240 Q225 218 252 210" stroke="#4a3520" stroke-width="7" fill="none" stroke-linecap="round"/>
          <ellipse cx="155" cy="220" rx="12" ry="8" fill="#7a5c2a" transform="rotate(-20,155,220)" opacity="0.8"/>
          <ellipse cx="250" cy="195" rx="10" ry="7" fill="#7a5c2a" transform="rotate(15,250,195)" opacity="0.8"/>
        </g>
        <!-- Seedling -->
        <g id="seedlingGroup">
          <path d="M200 360 Q199 340 200 320" stroke="#5a8a3a" stroke-width="4" fill="none" stroke-linecap="round"/>
          <ellipse cx="200" cy="310" rx="18" ry="12" fill="#4caf50" transform="rotate(-10,200,310)"/>
          <ellipse cx="190" cy="320" rx="14" ry="9" fill="#66bb6a" transform="rotate(15,190,320)"/>
          <ellipse cx="210" cy="318" rx="12" ry="8" fill="#81c784" transform="rotate(-20,210,318)"/>
        </g>
        <!-- Water drops -->
        <g id="waterDrops" opacity="0">
          <circle class="water-drop" cx="200" cy="300" r="4" fill="#64b5f6"/>
          <circle class="water-drop" cx="188" cy="320" r="3" fill="#64b5f6"/>
          <circle class="water-drop" cx="212" cy="315" r="3.5" fill="#64b5f6"/>
          <circle class="water-drop" cx="195" cy="340" r="3" fill="#90caf9"/>
        </g>
      </svg>
      <div class="fallen-petals" id="fallenPetals"></div>
    </div>

    <!-- Status -->
    <div class="status-panel">
      <div class="status-row">
        <div class="status-item">
          <span class="status-icon">💧</span>
          <div class="status-info">
            <span class="s-label">Wasserlevel</span>
            <div class="pbar"><div class="pfill wfill" id="waterFill" style="width:100%"></div></div>
          </div>
        </div>
        <div class="status-item">
          <span class="status-icon">🌿</span>
          <div class="status-info">
            <span class="s-label">Gesundheit</span>
            <div class="pbar"><div class="pfill hfill" id="healthFill" style="width:100%"></div></div>
          </div>
        </div>
      </div>
      <div class="stage-row">
        <span class="stage-emoji" id="stageEmoji">🌱</span>
        <span class="stage-name" id="stageName">Setzling</span>
      </div>
    </div>

    <!-- Message -->
    <div class="msgbox"><p id="msgText">Gieße deinen Setzling! 🌱</p></div>

    <!-- Water button -->
    <div style="width:100%;display:flex;justify-content:center;padding:.5rem 0">
      <button class="water-btn" id="waterBtn">
        <span class="btn-icon">💧</span>
        <span class="btn-text">Gießen</span>
        <span class="btn-sub" id="waterBtnSub">Jetzt möglich!</span>
      </button>
    </div>
    <div class="next-info" id="nextInfo"></div>

    <!-- Test Panel -->
    <div class="test-panel">
      <div class="test-title">🧪 Testmodus — Gieß-Intervall</div>
      <div class="test-row">
        <span class="test-label">Intervall:</span>
        <span class="test-value" id="intervalDisplay">24 Std.</span>
      </div>
      <input type="range" id="intervalSlider" min="0" max="100" value="100" />
      <div class="test-ticks">
        <span>1 Sek</span><span>1 Min</span><span>1 Std</span><span>24 Std</span>
      </div>
      <button class="reset-btn" id="resetBtn">🔄 Neu starten</button>
    </div>

  </div>

  <!-- Death overlay -->
  <div class="death-overlay" id="deathOverlay">
    <div class="death-box">
      <div class="de">🥀</div>
      <h2>Dein Baum ist verdurstet...</h2>
      <p>Er wurde 3 Intervalle lang nicht gegossen.</p>
      <button class="restart-btn" id="restartBtn">Neu starten 🌱</button>
    </div>
  </div>

  <!-- Watering overlay -->
  <div class="watering-overlay" id="wateringOverlay">
    <div class="watering-box">
      <span class="wcan">🪣</span>
      <p>Gießen...</p>
    </div>
  </div>

  <script>
  // ═══════════════════════════════════════════════════════
  //  MEIN BAUM — Inline Script
  // ═══════════════════════════════════════════════════════

  const STAGES = [
    { name:'Setzling',       emoji:'🌱', min:0,  seedling:1, trunk:0, branches:0, canopy:0, blossoms:0, fruits:0, msg:'Gieße deinen Setzling! 🌱' },
    { name:'Jungtrieb',      emoji:'🪴', min:3,  seedling:0, trunk:1, branches:0, canopy:0, blossoms:0, fruits:0, msg:'Ein kleiner Stamm! 🪴' },
    { name:'Jungbaum',       emoji:'🌿', min:7,  seedling:0, trunk:1, branches:1, canopy:0, blossoms:0, fruits:0, msg:'Erste Äste! 🌿' },
    { name:'Junger Baum',    emoji:'🌳', min:14, seedling:0, trunk:1, branches:1, canopy:1, blossoms:0, fruits:0, msg:'Ein grünes Blätterdach! 🌳' },
    { name:'Blühender Baum', emoji:'🌸', min:21, seedling:0, trunk:1, branches:1, canopy:1, blossoms:1, fruits:0, msg:'Wunderschöne Blüten! 🌸' },
    { name:'Fruchtbaum',     emoji:'🍎', min:35, seedling:0, trunk:1, branches:1, canopy:1, blossoms:1, fruits:1, msg:'Dein Baum trägt Früchte! 🍎' },
    { name:'Alter Baum',     emoji:'🌲', min:60, seedling:0, trunk:1, branches:1, canopy:1, blossoms:1, fruits:1, msg:'Ein majestätischer Baum! 🌲' },
  ];

  const KEY = 'meinbaum6';

  // State
  let wateringInterval = 86400; // Sekunden
  let lastWatered      = null;  // ms timestamp
  let totalWaterings   = 0;
  let alive            = true;
  let stageIndex       = 0;
  let isCooling        = false; // verhindert Doppelklick während Animation

  // Load
  function loadState() {
    try {
      const d = JSON.parse(localStorage.getItem(KEY));
      if (!d) return;
      if (d.wateringInterval != null) wateringInterval = d.wateringInterval;
      if (d.lastWatered      != null) lastWatered      = d.lastWatered;
      if (d.totalWaterings   != null) totalWaterings   = d.totalWaterings;
      if (d.alive            != null) alive             = d.alive;
      if (d.stageIndex       != null) stageIndex        = d.stageIndex;
    } catch(e) {}
  }

  function saveState() {
    localStorage.setItem(KEY, JSON.stringify(
      { wateringInterval, lastWatered, totalWaterings, alive, stageIndex }
    ));
  }

  // Time helpers
  function intervalMs() { return wateringInterval * 1000; }
  function deathMs()    { return intervalMs() * 3; }

  function canWater() {
    if (!alive || isCooling) return false;
    if (lastWatered === null) return true;
    return (Date.now() - lastWatered) >= intervalMs();
  }

  function isDead() {
    if (lastWatered === null) return false;
    return (Date.now() - lastWatered) >= deathMs();
  }

  function waterPct() {
    if (lastWatered === null) return 1;
    return Math.max(0, Math.min(1, 1 - (Date.now() - lastWatered) / deathMs()));
  }

  function healthPct() {
    const w = waterPct();
    if (w > .66) return 1;
    if (w > .33) return .4 + (w - .33) / .33 * .6;
    return w / .33 * .4;
  }

  function currentStage() {
    let s = STAGES[0];
    for (const st of STAGES) { if (totalWaterings >= st.min) s = st; }
    return s;
  }

  // Format
  function fmt(ms) {
    if (ms <= 0) return '0s';
    const s = Math.ceil(ms / 1000) % 60;
    const m = Math.floor(ms / 60000) % 60;
    const h = Math.floor(ms / 3600000) % 24;
    const d = Math.floor(ms / 86400000);
    if (d > 0) return `${d}T ${h}h ${m}m`;
    if (h > 0) return `${h}h ${m}m ${s}s`;
    if (m > 0) return `${m}m ${s}s`;
    return `${s}s`;
  }

  function fmtInterval(sec) {
    if (sec < 60)    return `${sec} Sek.`;
    if (sec < 3600)  return `${Math.round(sec/60)} Min.`;
    if (sec < 86400) return `${+(sec/3600).toFixed(1)} Std.`;
    return '24 Std.';
  }

  // Tree visuals
  function op(id, val, dur) {
    const e = document.getElementById(id);
    if (!e) return;
    e.style.transition = `opacity ${dur}`;
    e.style.opacity = val;
  }

  function applyStage(s, anim) {
    const d = anim ? '1.5s ease' : '0s';
    op('seedlingGroup', s.seedling, d);
    op('trunkGroup',    s.trunk,    d);
    op('branchGroup',   s.branches, d);
    op('canopyGroup',   s.canopy,   d);
    op('blossomGroup',  s.blossoms, d);
    op('fruitGroup',    s.fruits,   d);
    op('potGroup',      s.seedling, d);
    op('deadGroup',     0,          d);
    document.getElementById('stageEmoji').textContent = s.emoji;
    document.getElementById('stageName').textContent  = s.name;
    document.getElementById('fallenPetals').style.display = s.blossoms ? 'block' : 'none';
  }

  function applyDead() {
    const d = '2s ease';
    ['seedlingGroup','canopyGroup','blossomGroup','fruitGroup','trunkGroup','branchGroup']
      .forEach(id => op(id, 0, d));
    op('potGroup', 1, d);
    setTimeout(() => {
      op('deadGroup', 1, d);
      document.getElementById('deathOverlay').classList.add('show');
    }, 1500);
    document.getElementById('stageEmoji').textContent = '💀';
    document.getElementById('stageName').textContent  = 'Gestorben';
  }

  // Message
  let msgTimer = null;
  function showMsg(text, clearAfter) {
    const p = document.getElementById('msgText');
    p.style.opacity = '0';
    setTimeout(() => { p.textContent = text; p.style.opacity = '1'; }, 200);
    clearTimeout(msgTimer);
    if (clearAfter) msgTimer = setTimeout(updateUI, clearAfter);
  }

  // UI update (called every second)
  function updateUI() {
    if (isDead() && alive) {
      alive = false;
      saveState();
      applyDead();
      return;
    }
    if (!alive) return;

    // Bars
    document.getElementById('waterFill').style.width  = Math.round(waterPct()  * 100) + '%';
    document.getElementById('healthFill').style.width = Math.round(healthPct() * 100) + '%';
    document.body.classList.toggle('low-health',      healthPct() < .4);
    document.body.classList.toggle('critical-health', healthPct() < .15);

    // Counter
    document.getElementById('dayPill').textContent = `Gießung ${totalWaterings}`;

    // Stage change
    const stage = currentStage();
    const si    = STAGES.indexOf(stage);
    if (si !== stageIndex) {
      stageIndex = si;
      applyStage(stage, true);
      showMsg(stage.msg, 5000);
      saveState();
    }

    // Button state
    const btn = document.getElementById('waterBtn');
    if (canWater()) {
      btn.classList.remove('cooling');
      document.getElementById('waterBtnSub').textContent = 'Jetzt gießen!';
      document.getElementById('nextInfo').textContent = '';
    } else {
      btn.classList.add('cooling');
      const rem = lastWatered ? intervalMs() - (Date.now() - lastWatered) : 0;
      document.getElementById('waterBtnSub').textContent = rem > 0 ? fmt(rem) : '—';
      document.getElementById('nextInfo').textContent = rem > 0 ? `Nächste Gießung in ${fmt(rem)}` : '';
    }

    // Thirst messages
    if (waterPct() < .15)      showMsg('⚠️ Dein Baum verdurstet fast!');
    else if (waterPct() < .35) showMsg('Dein Baum hat Durst… 💧');
  }

  // WATER ACTION
  function doWater() {
    if (!canWater()) return;
    isCooling = true;
    document.getElementById('waterBtn').classList.add('cooling');
    document.getElementById('wateringOverlay').classList.add('show');
    document.getElementById('waterDrops').style.opacity = '1';

    setTimeout(() => {
      document.getElementById('wateringOverlay').classList.remove('show');
      document.getElementById('waterDrops').style.opacity = '0';
      isCooling = false;

      lastWatered = Date.now();
      totalWaterings++;
      saveState();
      updateUI();
      showMsg('Gegossen! Dein Baum dankt dir! 💧✨', 4000);
    }, 900);
  }

  // Restart
  function doRestart() {
    lastWatered    = Date.now();
    totalWaterings = 1;
    alive          = true;
    stageIndex     = 0;
    isCooling      = false;
    saveState();
    document.getElementById('deathOverlay').classList.remove('show');
    applyStage(STAGES[0], true);
    updateUI();
    showMsg('Neues Leben beginnt! 🌱');
  }

  // Debug reset
  function doReset() {
    if (!confirm('Spielstand löschen?')) return;
    localStorage.removeItem(KEY);
    lastWatered    = null;
    totalWaterings = 0;
    alive          = true;
    stageIndex     = 0;
    isCooling      = false;
    wateringInterval = 86400;
    document.getElementById('intervalSlider').value = 100;
    document.getElementById('intervalDisplay').textContent = '24 Std.';
    document.getElementById('deathOverlay').classList.remove('show');
    applyStage(STAGES[0], false);
    updateUI();
    showMsg('Willkommen! Gieße deinen Setzling! 🌱');
  }

  // Slider: 0–100 log → 1s–86400s
  function sliderToSec(v) {
    return Math.round(Math.exp((v / 100) * Math.log(86400)));
  }

  // SKY
  function lc(c1, c2, t) {
    const h = v => Math.round(v).toString(16).padStart(2,'0');
    const p = (i,j) => [parseInt(c1.slice(i,j),16), parseInt(c2.slice(i,j),16)];
    const [r1,r2]=p(1,3), [g1,g2]=p(3,5), [b1,b2]=p(5,7);
    return '#'+h(r1+(r2-r1)*t)+h(g1+(g2-g1)*t)+h(b1+(b2-b1)*t);
  }
  function lerp(a,b,t) {
    t=Math.max(0,Math.min(1,t));
    return {top:lc(a.top,b.top,t),mid:lc(a.mid,b.mid,t),bot:lc(a.bot,b.bot,t)};
  }
  function skyAt(h,m) {
    const f=m/60;
    const N={top:'#050812',mid:'#0a0e2a',bot:'#111840'};
    const D={top:'#1c6ea4',mid:'#3498db',bot:'#87ceeb'};
    if(h<5) return N;
    if(h<6) return lerp(N,{top:'#1a0a2e',mid:'#3b1f5e',bot:'#7b3f6e'},f);
    if(h<7) return lerp({top:'#1a0a2e',mid:'#3b1f5e',bot:'#7b3f6e'},{top:'#2d1b69',mid:'#c0392b',bot:'#ff7043'},f);
    if(h<8) return lerp({top:'#2d1b69',mid:'#c0392b',bot:'#ff7043'},{top:'#1a6bbd',mid:'#5aace0',bot:'#fdd775'},f);
    if(h<11) return lerp({top:'#1a6bbd',mid:'#5aace0',bot:'#fdd775'},D,Math.min(f+(h-8)/3,1));
    if(h<16) return D;
    if(h<17) return lerp(D,{top:'#1a3a6b',mid:'#2980b9',bot:'#f39c12'},f);
    if(h<19) return lerp({top:'#1a3a6b',mid:'#2980b9',bot:'#f39c12'},{top:'#0d1b3e',mid:'#8e44ad',bot:'#e74c3c'},f+(h-17)/2);
    if(h<20) return lerp({top:'#0d1b3e',mid:'#8e44ad',bot:'#e74c3c'},N,f);
    return N;
  }

  function updateSky() {
    const d  = new Date();
    const h  = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
    document.getElementById('timePill').textContent =
      String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
    const c = skyAt(h, m);
    document.getElementById('skyGradient').style.background =
      `linear-gradient(to bottom,${c.top} 0%,${c.mid} 50%,${c.bot} 100%)`;
    const t = (h*3600+m*60+s)/86400;
    const cel = document.getElementById('celestial');
    if (h < 6 || h >= 20) {
      const mt = h>=20 ? (h-20)/10 : (h+4)/10;
      cel.style.cssText=`left:${5+mt*90}vw;top:${20+30*Math.sin(mt*Math.PI)}%;
        width:44px;height:44px;background:#e8e4d0;border-radius:50%;
        box-shadow:0 0 20px rgba(232,228,208,.6);position:absolute;`;
      document.getElementById('stars').style.opacity='1';
    } else {
      const p=(t-.25)/.583, sx=5+p*90, sy=75-60*Math.sin(p*Math.PI);
      const dawn=h>=6&&h<9, dusk=h>=17&&h<20;
      const sc=dawn||dusk?'#ff7043':'#ffe066';
      cel.style.cssText=`left:${sx}vw;top:${sy}%;width:56px;height:56px;
        background:${sc};border-radius:50%;
        box-shadow:0 0 20px ${dawn||dusk?'rgba(255,112,67,.5)':'rgba(255,224,102,.4)'};
        position:absolute;transition:left 8s linear,top 8s linear,background 3s ease;`;
      document.getElementById('stars').style.opacity=String(h<8||h>=18?.3:0);
    }
  }

  function makeStars() {
    const c = document.getElementById('stars');
    c.innerHTML = '';
    for (let i=0;i<70;i++) {
      const s=document.createElement('div'), sz=Math.random()*2.5+.5;
      s.className='star';
      s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*65}%;--d:${2+Math.random()*4}s;--del:${-Math.random()*5}s;`;
      c.appendChild(s);
    }
  }

  function makePetals() {
    const c = document.getElementById('fallenPetals');
    c.innerHTML='';
    for(let i=0;i<6;i++){
      const p=document.createElement('div'); p.className='petal';
      p.style.cssText=`left:${15+Math.random()*70}%;animation-delay:${-Math.random()*8}s;animation-duration:${7+Math.random()*5}s;`;
      c.appendChild(p);
    }
  }

  // ── BOOT ─────────────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    loadState();
    makeStars();
    makePetals();

    // Sync slider to loaded interval
    const sliderVal = Math.round((Math.log(wateringInterval) / Math.log(86400)) * 100);
    document.getElementById('intervalSlider').value = sliderVal;
    document.getElementById('intervalDisplay').textContent = fmtInterval(wateringInterval);

    // Wire up buttons
    document.getElementById('waterBtn').addEventListener('click', doWater);
    document.getElementById('resetBtn').addEventListener('click', doReset);
    document.getElementById('restartBtn').addEventListener('click', doRestart);
    document.getElementById('intervalSlider').addEventListener('input', function() {
      wateringInterval = sliderToSec(this.value);
      document.getElementById('intervalDisplay').textContent = fmtInterval(wateringInterval);
      saveState();
      updateUI();
    });

    // Initial visuals
    const stage = currentStage();
    stageIndex = STAGES.indexOf(stage);
    applyStage(stage, false);

    if (isDead() && alive) {
      alive = false;
      saveState();
      applyDead();
    } else {
      updateUI();
    }

    setInterval(updateSky, 1000);
    setInterval(updateUI,  1000);
    updateSky();
  });
  </script>
</body>
</html>
